name: Bug Report
description: Report a bug in torchao
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code example that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide:
        - torch version (`python -c "import torch; print(torch.__version__)"`)
        - torchao version (`python -c "import torchao; print(torchao.__version__)"`)
        - GPU (e.g., H100, A100, CPU)
        - CUDA version (`nvcc --version`)
        - OS
      render: text
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Quantization config used
      description: Which Config class and parameters? (e.g., Int4WeightOnlyConfig(group_size=32))
      render: python
    validations:
      required: false

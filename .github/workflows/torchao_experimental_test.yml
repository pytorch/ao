name: Run TorchAO Experimental Tests

on:
  push:
    branches:
      - main
      - 'gh/**'
  pull_request:
    branches:
      - main
      - 'gh/**'

jobs:
  test:
    strategy:
      matrix:
        runner: [macos-14]
    runs-on: ${{matrix.runner}}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: true
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.10.11
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install torch=="2.6.0.dev20250102" --extra-index-url "https://download.pytorch.org/whl/nightly/cpu"
          pip install -r dev-requirements.txt
          pip install .
      - name: Run tests
        run: |
          python torchao/experimental/tests/test_packed_linear_int8_dynamic_activation_intx_weight_layout.py

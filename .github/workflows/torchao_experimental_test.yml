name: Run TorchAO Experimental Tests

on:
  push:
    branches:
      - main
      - 'gh/**'
  pull_request:
    branches:
      - main
      - 'gh/**'

jobs:
  test:
    strategy:
      matrix:
        runner: [macos-14]
    runs-on: ${{matrix.runner}}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          submodules: true
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: 3.10
          miniconda-version: "latest"
          auto-activate-base: true
      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install torch
          pip install -r dev-requirements.txt
          pip list
          python -c 'import torch;print(f"torch: {torch.__version__, torch.version.git_version}")'
          
          USE_CPP=1 pip install .

          python torchao/experimental/tests/test_packed_linear_int8_dynamic_activation_intx_weight_layout.py
